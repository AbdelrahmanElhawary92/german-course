<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Deutsch Speaking Bootcamp | B1</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#eef2ff,#f5f7fb);
      color:#111;
    }

    header{
      background:#0b0f1a;
      color:#fff;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      color:#00bfff;
      margin:0;
    }

    .badge{
      background:#ffcc00;
      color:#000;
      padding:5px 10px;
      border-radius:8px;
      font-weight:bold;
      font-size:12px;
    }

    .lang button{
      margin:3px;
      padding:8px 12px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:25px;
      margin:20px 0;
      border-radius:15px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-2px);
    }

    .btn{
      display:inline-block;
      background:linear-gradient(90deg,#ffcc00,#ff9900);
      padding:14px 22px;
      border-radius:10px;
      text-decoration:none;
      color:#000;
      font-weight:bold;
      margin-top:10px;
    }

    .video{
      width:100%;
      border-radius:12px;
      margin-top:10px;
    }

    .price{
      font-size:32px;
      font-weight:bold;
      color:#1a8f00;
    }

    .old{
      text-decoration:line-through;
      color:#888;
      margin-left:10px;
      font-size:18px;
    }

    .review{
      background:#f8f9ff;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      border-left:4px solid #00bfff;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#0b0f1a;
      color:#aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>Ian Academy</h1>
  <div class="badge">🔥 B1 SPEAKING BOOTCAMP</div>
</header>

<div class="container">

  <!-- HERO -->
  <div class="card">
    <h2 id="title"></h2>

    <p id="desc"></p>

    <video class="video" controls>
      <source src="your-video.mp4" type="video/mp4">
    </video>

    <p id="note"></p>

    <a class="btn" href="https://wa.me/201159682355" id="cta1">Jetzt anmelden</a>
  </div>

  <!-- VALUE -->
  <div class="card">
    <h3 id="detailsTitle"></h3>
    <ul>
      <li id="d1"></li>
      <li id="d2"></li>
      <li id="d3"></li>
      <li id="d4"></li>
    </ul>
  </div>

  <!-- REVIEWS -->
  <div class="card">
    <h3 id="reviewTitle"></h3>

    <div class="review" id="r1"></div>
    <div class="review" id="r2"></div>
    <div class="review" id="r3"></div>
  </div>

  <!-- PRICE -->
  <div class="card">
    <h3 id="priceTitle"></h3>

    <div>
      <span class="price">150€</span>
      <span class="old">200€</span>
    </div>

    <p id="priceNote"></p>

    <a class="btn" href="https://wa.me/201159682355" id="cta2">Jetzt sichern</a>
  </div>

</div>

<footer>
  © 2026 Ian Academy
</footer>

<script>

const lang = {

    title:"Deutsch Speaking Bootcamp (7 Tage) – B1 Level",
    desc:"Intensives 7-Tage Speaking Training für Menschen in Deutschland. Fokus: echtes Sprechen im Alltag & Job.",
    note:"📍 Für B1 Level Lernende in Deutschland (Job – Studium – Integration)",
    detailsTitle:"Was du bekommst",
    d1:"7 Tage intensives Speaking Training",
    d2:"2 Stunden tägliche Live Practice",
    d3:"Kleine Gruppen (max. 10 Personen)",
    d4:"Fokus auf echte Kommunikation im Alltag & Job",

    reviewTitle:"Erfahrungen von Teilnehmern",
    r1:"„Nach dem Bootcamp konnte ich endlich im Job auf Deutsch sprechen.“ – Teilnehmer",
    r2:"„Sehr praxisnah, kein langweiliges Grammatiklernen.“ – Student",
    r3:"„Ich habe viel mehr Selbstvertrauen beim Sprechen.“ – Teilnehmer",

    priceTitle:"Preis",
    priceNote:"⚡ Limited Spots – nur 10 Plätze verfügbar",
    cta:"Jetzt anmelden"

function setLang(l){
  document.getElementById("title").innerText = lang[l].title;
  document.getElementById("desc").innerText = lang[l].desc;
  document.getElementById("note").innerText = lang[l].note;

  document.getElementById("detailsTitle").innerText = lang[l].detailsTitle;
  document.getElementById("d1").innerText = lang[l].d1;

  document.getElementById("r3").innerText = lang[l].r3;

  document.getElementById("priceNote").innerText = lang[l].priceNote;

setLang('de');

</script>

</body>
</html>
